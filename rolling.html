<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>AX 자회사별 롤링 모니터</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0a0f1c; --panel:#121a2c; --panel2:#0e1626; --line:#243352;
    --ink:#eaf1fb; --sub:#8fa6c6; --muted:#5d7299;
    --green:#22c55e; --yellow:#f0b429; --red:#ef4444;
    --up:#f87171; --down:#60a5fa; --new:#f59e0b;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;height:100%;width:100%;}
  body{font-family:"Noto Sans KR",-apple-system,BlinkMacSystemFont,"Apple SD Gothic Neo","Malgun Gothic",sans-serif;
    background:radial-gradient(1200px 700px at 70% -10%,#15233f 0%,var(--bg) 55%);
    color:var(--ink);overflow:hidden;display:flex;align-items:center;justify-content:center;height:100vh;width:100vw;}
  /* 1920x1080 고정 디자인 → 화면 크기에 맞춰 자동 축소(레터박스) */
  .stage{width:1920px;height:1080px;flex:0 0 auto;display:flex;flex-direction:column;
    padding:34px 44px 26px;position:relative;transform-origin:center center;}
  #screen{flex:1;display:flex;flex-direction:column;min-height:0;}
  /* ===== header ===== */
  .header{display:flex;justify-content:space-between;align-items:flex-end;
    border-bottom:2px solid var(--line);padding-bottom:16px;margin-bottom:18px;flex:0 0 auto;}
  .header .co{font-size:58px;font-weight:900;letter-spacing:-1px;line-height:1;}
  .header .co small{font-size:30px;color:var(--sub);font-weight:700;margin-left:8px;}
  .header .sub{font-size:23px;color:var(--sub);margin-top:11px;font-weight:500;}
  .header .sub b{color:var(--ink);font-weight:700;}
  .header .right{text-align:right;}
  .header .clock{font-size:28px;color:var(--sub);font-weight:500;}
  .header .clock b{color:var(--ink);font-weight:700;}
  .cd{margin-top:12px;display:inline-flex;align-items:center;gap:14px;background:#0c1424;
    border:1px solid var(--line);border-radius:14px;padding:10px 18px;}
  .cd .lbl{font-size:17px;color:var(--sub);}
  .cd .ring{position:relative;width:52px;height:52px;}
  .cd .ring svg{transform:rotate(-90deg);}
  .cd .ring .t{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;
    font-size:22px;font-weight:900;font-variant-numeric:tabular-nums;}
  /* ===== list ===== */
  .list{display:flex;flex-direction:column;gap:var(--listgap,12px);flex:0 0 auto;overflow:hidden;}
  .row{display:flex;align-items:center;gap:20px;background:var(--panel);
    border:1px solid var(--line);border-radius:14px;padding:var(--rowpad,16px) 24px;position:relative;will-change:transform;}
  .dot{width:var(--dotsz,26px);height:var(--dotsz,26px);border-radius:50%;flex:0 0 auto;box-shadow:0 0 0 5px rgba(255,255,255,.04);}
  .dot.green{background:var(--green);box-shadow:0 0 16px 2px rgba(34,197,94,.5);}
  .dot.yellow{background:var(--yellow);box-shadow:0 0 16px 2px rgba(240,180,41,.5);}
  .dot.red{background:var(--red);box-shadow:0 0 16px 2px rgba(239,68,68,.55);}
  .gno{font-size:var(--gnofs,30px);font-weight:900;color:var(--sub);width:72px;flex:0 0 auto;text-align:center;font-variant-numeric:tabular-nums;}
  .task{font-size:var(--taskfs,31px);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .leader{flex:1;border-bottom:2px dotted #2c3c5e;margin:0 6px;height:1px;transform:translateY(6px);min-width:20px;}
  .metric{font-size:var(--metfs,26px);font-weight:500;color:var(--sub);white-space:nowrap;flex:0 0 auto;}
  .metric .num{font-size:var(--numfs,34px);font-weight:900;color:var(--ink);font-variant-numeric:tabular-nums;}
  .silence{width:var(--silw,300px);text-align:right;}
  .speakers{width:var(--spw,238px);text-align:right;}
  .delta{font-size:var(--metfs,22px);font-weight:700;margin-left:5px;}
  .delta.up{color:var(--up);} .delta.down{color:var(--down);}
  .actioncnt{width:var(--actw,228px);text-align:right;font-size:var(--actfs,24px);color:var(--sub);font-weight:500;flex:0 0 auto;}
  .actioncnt b{font-size:var(--actbfs,32px);font-weight:900;color:#7dd3fc;font-variant-numeric:tabular-nums;}
  .actioncnt.zero b{color:var(--muted);}
  /* ===== bottom ===== */
  .bottom{display:grid;grid-template-columns:1.18fr 1fr;gap:20px;margin-top:18px;flex:1;min-height:0;}
  .pane{background:var(--panel2);border:1px solid var(--line);border-radius:14px;padding:14px 18px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .pane h3{margin:0 0 12px;font-size:20px;font-weight:900;color:var(--ink);display:flex;align-items:center;gap:10px;flex:0 0 auto;}
  .pane h3 .bar{width:6px;height:20px;border-radius:3px;background:#3b82f6;}
  .pane h3 .hint{font-size:14px;color:var(--muted);font-weight:500;margin-left:auto;}
  .pane .body{flex:1;min-height:0;overflow:hidden;}
  /* keyword timeline grid (공유 시간축) */
  .kwgrid{display:grid;column-gap:10px;row-gap:var(--kwrowgap,8px);align-items:stretch;height:100%;align-content:start;}
  .kwgrid .axh{font-size:13px;color:var(--muted);font-weight:700;text-align:center;
    border-bottom:1px solid #22324f;padding-bottom:4px;}
  .kwgrid .axh.corner{border:none;}
  .kwgrid .nm{font-size:var(--namefs,18px);font-weight:900;color:var(--sub);display:flex;align-items:center;}
  .kwgrid .cell{display:flex;flex-wrap:wrap;gap:5px;align-content:center;border-left:1px dashed #1d2a44;padding:2px 6px;}
  .kwgrid .cell.first{border-left:none;}
  .chip{background:#1b2840;border:1px solid #2c3c5e;color:#c7d6ee;border-radius:7px;
    padding:3px 9px;font-size:var(--chipfs,17px);font-weight:500;white-space:nowrap;}
  .chip.new{border-color:var(--new);color:#fde68a;}
  .newbadge{background:var(--new);color:#1a1205;font-size:11px;font-weight:900;border-radius:5px;
    padding:1px 6px;margin-left:5px;vertical-align:middle;display:inline-block;}
  /* action items */
  .actgrid{display:flex;flex-direction:column;gap:var(--kwrowgap,8px);height:100%;}
  .actrow{display:flex;gap:14px;align-items:flex-start;}
  .actrow .nm{width:96px;flex:0 0 auto;font-size:var(--namefs,18px);font-weight:900;color:var(--sub);}
  .actrow .items{flex:1;display:flex;flex-direction:column;gap:3px;min-width:0;}
  .actitem{font-size:var(--actitemfs,19px);font-weight:500;color:#dbe6f7;line-height:1.3;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .actitem.empty{color:var(--muted);}
  /* ===== overview (전체 차트 요약) ===== */
  .ovlegend{display:flex;gap:26px;align-items:center;font-size:16px;color:var(--sub);font-weight:600;margin:-2px 0 14px;flex:0 0 auto;}
  .ovlegend .sw{display:inline-block;width:26px;height:13px;border-radius:3px;margin-right:8px;vertical-align:-1px;}
  .ovlegend .sw.bar{background:linear-gradient(90deg,rgba(239,68,68,.38),rgba(239,68,68,1));}
  .ovlegend .ln{display:inline-block;width:26px;height:3px;border-radius:2px;background:#5eead4;margin-right:8px;vertical-align:3px;position:relative;}
  .ovlegend .ln::after{content:"";position:absolute;left:9px;top:-2.5px;width:8px;height:8px;border-radius:50%;background:#5eead4;}
  .ovlegend .dot{display:inline-block;width:13px;height:13px;border-radius:50%;margin-right:7px;vertical-align:-1px;}
  .ovlegend .dot.g{background:var(--green);} .ovlegend .dot.y{background:var(--yellow);} .ovlegend .dot.r{background:var(--red);}
  .ovlegend .bsw{display:inline-block;width:16px;height:14px;border-radius:3px;margin-right:7px;vertical-align:-2px;}
  .ovlegend .bsw.g{background:var(--green);} .ovlegend .bsw.y{background:var(--yellow);} .ovlegend .bsw.r{background:var(--red);}
  .ovlegend .lglb{color:var(--muted);font-weight:700;}
  .ovx{display:flex;gap:22px;flex:1;min-height:0;}
  .ovL{width:1186px;flex:0 0 auto;display:flex;flex-direction:column;gap:18px;min-height:0;}
  .ovR{flex:1;min-width:0;display:flex;flex-direction:column;min-height:0;}
  .ocard{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:14px 20px;
    display:flex;flex-direction:column;min-height:0;overflow:hidden;cursor:pointer;transition:border-color .2s,transform .2s;}
  .ocard:hover{border-color:#3b82f6;transform:translateY(-2px);}
  .ohd{display:flex;align-items:baseline;gap:10px;flex:0 0 auto;margin-bottom:4px;}
  .ohd .t{font-size:25px;font-weight:900;letter-spacing:-.5px;}
  .ohd .c{font-size:16px;color:var(--sub);font-weight:700;margin-left:auto;}
  .ohero{flex:1.1;}
  .ohero .ohd .t{font-size:30px;}
  .obottom{flex:1;display:flex;gap:18px;min-height:0;}
  .obcard{flex-grow:var(--n,1);flex-basis:0;min-width:0;}
  .chartwrap{flex:1;display:flex;align-items:center;justify-content:center;min-height:0;overflow:hidden;}
  .cchart{display:block;flex:0 0 auto;}
  .oacts{flex:0 0 auto;margin-top:8px;display:flex;flex-direction:column;gap:3px;}
  .oacts.two{display:grid;grid-template-columns:1fr 1fr;gap:3px 24px;}
  .oactitem{font-size:18px;color:#dbe6f7;font-weight:500;line-height:1.32;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .oactitem::before{content:"› ";color:#6f86ab;font-weight:800;}
  .oactitem .more{color:var(--sub);font-weight:700;}
  .oactitem.empty{color:var(--muted);} .oactitem.empty::before{content:"";}
  .obcard .oactitem{font-size:15px;}
  /* 기타 자회사 사이드바 */
  .osidecard{flex:1;background:var(--panel);border:1px solid var(--line);border-radius:16px;
    padding:12px 18px;display:flex;flex-direction:column;min-height:0;overflow:hidden;}
  .osidecard .shd{font-size:20px;font-weight:900;color:var(--ink);margin-bottom:4px;flex:0 0 auto;display:flex;align-items:center;gap:9px;}
  .osidecard .shd .bar{width:6px;height:20px;border-radius:3px;background:#ef4444;}
  .oslist{flex:1;display:flex;flex-direction:column;min-height:0;}
  .osrow{display:grid;grid-template-columns:150px 108px 1fr;align-items:center;gap:12px;
    flex:1;min-height:0;border-top:1px solid #1b2740;cursor:pointer;transition:background .15s;}
  .osrow:first-child{border-top:none;}
  .osrow:hover{background:#0e1626;}
  .osrow .snm{font-size:17px;font-weight:800;line-height:1.1;overflow:hidden;}
  .osrow .snm small{display:block;font-size:13px;color:var(--sub);font-weight:600;margin-top:2px;}
  .osrow .schart{display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .osrow .sact{font-size:15px;color:#cdd9ee;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .osrow .sact::before{content:"› ";color:#6f86ab;font-weight:800;}
  .osrow .sact .more{color:var(--sub);font-weight:700;}
  .osrow .sact.empty{color:var(--muted);} .osrow .sact.empty::before{content:"";}
  /* ===== summary 화면 (은행 / 카드·증권·라이프 / 기타) ===== */
  .sumbank{display:flex;flex-direction:column;flex:1;min-height:0;gap:14px;}
  .bigchart{flex:0 0 auto;display:flex;align-items:center;justify-content:center;}
  .bigacts{flex:1;min-height:0;background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:14px 24px;display:flex;flex-direction:column;overflow:hidden;}
  .bah{font-size:21px;font-weight:900;margin-bottom:12px;flex:0 0 auto;}
  .bah span{color:var(--sub);font-size:16px;font-weight:700;margin-left:6px;}
  .baglist{flex:1;min-height:0;display:grid;grid-template-columns:repeat(3,1fr);grid-template-rows:repeat(4,auto);
    grid-auto-flow:column;gap:7px 34px;align-content:start;}
  .baglist .oactitem{font-size:20px;}
  /* 통일 요약 레이아웃: 상단 차트 + 하단 액션 아이템 */
  .ovpage{display:flex;flex-direction:column;flex:1;min-height:0;gap:16px;}
  .ovcharts{flex:1.2;min-height:0;display:flex;gap:18px;}
  .actsec{flex:1;min-height:0;background:var(--panel2);border:1px solid var(--line);border-radius:14px;
    padding:13px 22px;display:flex;flex-direction:column;overflow:hidden;}
  .ash{font-size:20px;font-weight:900;margin-bottom:12px;flex:0 0 auto;}
  .ash span{color:var(--sub);font-size:15px;font-weight:700;}
  .actflow{flex:1;min-height:0;column-count:3;column-gap:26px;overflow:hidden;}
  .aitem{display:flex;align-items:center;gap:9px;width:100%;margin-bottom:8px;break-inside:avoid;
    background:var(--panel);border:1px solid var(--line);border-radius:9px;padding:6px 12px;}
  .aitem .atag{font-size:13px;font-weight:800;padding:1px 9px;border-radius:6px;flex:0 0 auto;
    color:var(--c);border:1px solid var(--c);background:transparent;}
  .aitem .gnum{font-size:13px;font-weight:800;color:#9fb0cc;flex:0 0 auto;font-variant-numeric:tabular-nums;}
  .aitem .aitxt{font-size:15px;font-weight:500;color:#dbe6f7;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1 1 auto;min-width:0;}
  .aitem.more .aitxt{color:var(--c);font-weight:800;}
  .aitem.none{opacity:.6;} .aitem.none .aitxt{color:var(--muted);}
  .midrow{display:flex;gap:18px;flex:1;min-height:0;}
  .midcard{flex-grow:var(--n,1);flex-basis:0;min-width:0;}
  .midcard .ohd .t{font-size:28px;}
  .midcard .oactitem{font-size:17px;}
  .sumother{display:flex;flex-direction:column;flex:1;min-height:0;gap:14px;}
  .goChart{flex:0 0 auto;display:flex;justify-content:center;}
  .goActs{flex:1;min-height:0;display:flex;background:var(--panel2);border:1px solid var(--line);
    border-radius:14px;overflow:hidden;}
  .gpanel{flex-grow:var(--n,1);flex-basis:0;min-width:0;border-left:1px solid var(--line);
    padding:11px 15px;overflow:hidden;cursor:pointer;transition:background .15s;}
  .gpanel:first-child{border-left:none;}
  .gpanel:hover{background:#0e1626;}
  .gnm{font-size:18px;font-weight:900;margin-bottom:8px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .gnm small{color:var(--sub);font-weight:600;font-size:13px;margin-left:5px;}
  .git{font-size:15px;color:#dbe6f7;font-weight:500;line-height:1.32;margin-bottom:5px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .git::before{content:"› ";color:#6f86ab;font-weight:800;}
  .git .more{color:var(--sub);font-weight:700;}
  .git.empty{color:var(--muted);} .git.empty::before{content:"";}
  /* ===== 조별 Insight Dashboard (2단 운영 관제 카드) ===== */
  .igrid{display:grid;grid-template-columns:1fr 1fr;gap:24px;flex:1;min-height:0;margin-bottom:34px;}
  .icard{background:var(--panel);border:1px solid var(--line);
    border-radius:18px;padding:22px 26px;display:flex;flex-direction:column;min-height:0;overflow:hidden;gap:18px;}
  .icard.empty{background:transparent;border:1px dashed #1b2740;}
  .ihead{flex:0 0 auto;}
  .ihead .htop{display:flex;align-items:baseline;gap:11px;}
  .ino{font-size:21px;font-weight:900;color:#aebfd9;background:#16223a;border:1px solid #2c3c5e;
    border-radius:9px;padding:2px 12px;flex:0 0 auto;}
  .ico{font-size:22px;font-weight:800;letter-spacing:-.3px;color:var(--sub);}
  .itask{font-size:26px;color:var(--ink);font-weight:800;letter-spacing:-.4px;margin-top:9px;line-height:1.25;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .istatus{flex:0 0 auto;display:flex;gap:14px;align-items:stretch;}
  .stile{background:var(--panel2);border:1px solid var(--line);border-radius:13px;padding:11px 18px;
    display:flex;flex-direction:column;justify-content:center;}
  .stile .slab{font-size:14px;color:var(--muted);font-weight:700;margin-bottom:2px;}
  .stile .sval{font-size:32px;font-weight:900;line-height:1;font-variant-numeric:tabular-nums;}
  .stile .sval.green{color:#7ef0a8;} .stile .sval.yellow{color:#fcd968;} .stile .sval.red{color:#fca5a5;}
  .stile .ssub{font-size:14px;color:var(--sub);font-weight:600;margin-top:4px;}
  .sbadge{flex-direction:row;align-items:center;justify-content:center;gap:9px;min-width:158px;font-weight:900;}
  .sbadge .se{font-size:26px;} .sbadge b{font-size:30px;}
  .sbadge.green{background:rgba(34,197,94,.16);border-color:#2c8e54;color:#7ef0a8;}
  .sbadge.yellow{background:rgba(240,180,41,.16);border-color:#9a7a26;color:#fcd968;}
  .sbadge.red{background:rgba(239,68,68,.16);border-color:#9a3b3b;color:#fca5a5;}
  .stile.spark{flex:1;align-items:center;justify-content:center;padding:6px 14px;}
  .itl{flex:1;min-height:0;display:flex;flex-direction:column;overflow:hidden;}
  .itlh{font-size:15px;font-weight:800;color:var(--muted);margin-bottom:6px;flex:0 0 auto;letter-spacing:.3px;}
  /* 토론 여정(journey) 타임라인 — 연결선 + 노드 + 진행 강조 */
  .journey{flex:1;min-height:0;display:flex;flex-direction:column;}
  .jrow{flex:1;display:flex;gap:16px;min-height:0;position:relative;}
  .jmark{position:relative;width:22px;flex:0 0 auto;display:flex;justify-content:center;}
  .jmark::before{content:"";position:absolute;top:0;bottom:0;left:50%;width:2px;transform:translateX(-50%);background:#2c3c5e;}
  .jrow:first-child .jmark::before{top:15px;}
  .jrow:last-child .jmark::before{bottom:auto;height:15px;}
  .jnode{position:relative;z-index:1;width:13px;height:13px;border-radius:50%;margin-top:8px;
    background:#3b82f6;border:2px solid var(--panel);box-shadow:0 0 0 2px #3b82f6;}
  .jrow.active .jnode{width:18px;height:18px;margin-top:6px;background:#5eead4;border-color:var(--panel);
    box-shadow:0 0 0 3px rgba(94,234,212,.35),0 0 14px 3px rgba(94,234,212,.6);animation:jpulse 1.7s ease-in-out infinite;}
  @keyframes jpulse{0%,100%{box-shadow:0 0 0 3px rgba(94,234,212,.3),0 0 10px 2px rgba(94,234,212,.45);}
    50%{box-shadow:0 0 0 7px rgba(94,234,212,.16),0 0 22px 7px rgba(94,234,212,.85);}}
  .jbody{flex:1;min-width:0;display:flex;flex-direction:column;justify-content:center;padding:4px 0;}
  .jtime{font-size:14px;font-weight:800;color:#7d8db0;}
  .jtime em{font-style:normal;color:#5eead4;font-weight:800;}
  .jrow.active .jtime{color:#5eead4;}
  .jdesc{font-size:18px;font-weight:500;color:#b9c6dc;line-height:1.35;margin-top:3px;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .jrow.active .jdesc{color:#eaf1fb;font-weight:600;}
  .ispacer{flex:0 0 30px;}
  .iai{flex:0 0 auto;background:linear-gradient(90deg,rgba(59,130,246,.14),rgba(59,130,246,.02));
    border:1px solid #2b4a7e;border-left:4px solid #3b82f6;border-radius:12px;padding:13px 18px;}
  .ailab{font-size:13px;font-weight:900;color:#7dd3fc;letter-spacing:1px;margin-bottom:6px;}
  .aitxt2{font-size:18px;font-weight:600;color:#eaf1fb;line-height:1.45;}
  /* controls */
  .controls{position:absolute;right:44px;bottom:22px;display:flex;gap:9px;align-items:center;z-index:5;}
  .btn{background:#16223a;border:1px solid var(--line);color:var(--ink);border-radius:10px;
    padding:10px 15px;font-size:16px;font-weight:700;cursor:pointer;font-family:inherit;}
  .btn:hover{background:#1e2d4a;}
  .btn.sim{background:#1d4ed8;border-color:#2563eb;}
  .btn.sim:hover{background:#2563eb;}
  .speed{display:flex;align-items:center;gap:11px;background:#16223a;border:1px solid var(--line);
    border-radius:10px;padding:8px 15px;margin-right:3px;}
  .speed .slbl{font-size:15px;font-weight:700;color:var(--sub);white-space:nowrap;}
  .speed .slbl b{color:var(--ink);font-variant-numeric:tabular-nums;font-weight:900;}
  .speed input[type=range]{width:120px;height:5px;-webkit-appearance:none;appearance:none;
    background:#2c3c5e;border-radius:3px;outline:none;cursor:pointer;}
  .speed input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;appearance:none;

/* ============================ 유틸 ============================ */
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;let t=Math.imul(a^a>>>15,1|a);
  t=t+Math.imul(t^t>>>7,61|t)^t;return ((t^t>>>14)>>>0)/4294967296;};}
const clamp=(v,lo,hi)=>Math.max(lo,Math.min(hi,v));
const STATUS_ORDER={red:0,yellow:1,green:2};
const COLORS=["green","yellow","red"];

/* ============================ 데이터 생성 (배치 4차 = 60~80분) ============================ */
let CURRENT_BATCH=4;
const START=new Date("2025-06-02T13:18:00"); // +80분 => 14:38
let GROUPS=[];
/* 토론 활성도(=100-침묵) 기준: 90↑ 활발 / 80↑ 주의 / 80미만 침체 */
function statusFromSilence(s){ const act=100-s; return act>=90?"green":act>=80?"yellow":"red"; }

function buildInitial(){
  GROUPS=TASKS.map((t,i)=>{
    const id=i+1, rng=mulberry32(id*2654435761), kp=t.kw, B=CURRENT_BATCH;
    const part=6+Math.floor(rng()*4); // 참여자수 6~9명
    // 20분 단위 침묵비율/발언자수 시계열 + 구간별 쟁점 키워드 3개
    let sil=clamp(7+rng()*9,5,18), sp=3+Math.floor(rng()*(part-3));
    const tl=[];
    for(let b=0;b<B;b++){
      sil=clamp(sil+(rng()*9-4.2),4,24);
      sp=clamp(sp+(rng()<.5?-1:1),2,part);
      tl.push({batch:b+1,label:`${b*20}~${(b+1)*20}분`,sil:Math.round(sil),sp:Math.round(sp),
        kws:[0,1,2].map(j=>({k:kp[(b+j)%kp.length]}))});
    }
    const last=tl[B-1], prev=tl[B-2]||last;
    const status=statusFromSilence(last.sil);
    const acts=t.actions.map(txt=>({txt,neu:false}));
    return {id,company:t.company,task:t.task,kwpool:kp,status,prevStatus:status,part,
      sil:last.sil,prevSil:prev.sil,sp:last.sp,prevSp:prev.sp,tl,acts};
  });
  // 자회사별 신호등 변경 1~2개
  SUBS.forEach((co,si)=>{
    const gs=GROUPS.filter(g=>g.company===co);
    const rng=mulberry32(1000+si*97);
    const n=1+(rng()<0.4?1:0);
    for(let k=0;k<n && k<gs.length;k++){
      const g=gs[Math.floor(rng()*gs.length)];
      let np=g.status; while(np===g.status) np=COLORS[Math.floor(rng()*3)];
      g.prevStatus=np;
    }
  });
  // 조가 많은 화면(은행/카드/증권 등 4개 이상)에는 '액션 미도출' 1개 이상 보장
  SCREENS.filter(s=>s.type==="sub").forEach(s=>{
    const gs=groupsForScreen(s);
    if(gs.length>=4 && !gs.some(g=>g.acts.length===0)){
      const pick=gs.slice().sort((a,b)=>STATUS_ORDER[b.status]-STATUS_ORDER[a.status])[0];
      pick.acts=[];
    }
  });
}
function groupsForScreen(scr){
  let gs=GROUPS.filter(g=>g.company===scr.company);
  if(scr.range) gs=gs.slice(scr.range[0],scr.range[1]);
  return gs;
}
function sortByStatus(gs){ return gs.slice().sort((a,b)=> b.sil-a.sil || STATUS_ORDER[a.status]-STATUS_ORDER[b.status]); }

/* 갱신 시뮬레이션 — 다음 배치 생성 */
let SIM_SEED=777;
function simulateBatch(){
  CURRENT_BATCH++; SIM_SEED+=131;
  GROUPS.forEach((g,i)=>{
    const rng=mulberry32(g.id*40503+SIM_SEED);
    g.prevSil=g.sil; g.prevSp=g.sp; g.prevStatus=g.status;
    const m=rng();
    let d=m<0.4?(2+Math.round(rng()*6)):m<0.8?-(2+Math.round(rng()*5)):0;
    g.sil=clamp(g.sil+d,4,24);
    const sm=rng(); g.sp=clamp(g.sp+(sm<0.4?-1:sm<0.75?1:0),2,g.part);
    g.status=statusFromSilence(g.sil);
    const nb=g.tl.length+1, kp=g.kwpool;
    g.tl.push({batch:nb,label:`${(nb-1)*20}~${nb*20}분`,sil:g.sil,sp:g.sp,
      kws:[0,1,2].map(j=>({k:kp[(nb-1+j)%kp.length]}))});
    if(g.tl.length>4) g.tl=g.tl.slice(-4); // 최근 4구간만 표시
    g.acts.forEach(a=>a.neu=false);
    if(rng()<0.45){
      const pool=TASKS[i].actions;
      const extra=["세부 실행 TF 구성 및 책임자 지정","파일럿 결과 기반 확대 적용 검토","관련 부서 협의체 격주 운영"];
      const txt=g.acts.length<pool.length?pool[g.acts.length]:extra[g.acts.length%extra.length];
      g.acts.push({txt,neu:true});
    }
  });
  SUBS.forEach((co,si)=>{
    const gs=GROUPS.filter(g=>g.company===co);
    const rng=mulberry32(5000+si*53+SIM_SEED);
    if(!gs.some(g=>g.prevStatus!==g.status)){
      const g=gs[Math.floor(rng()*gs.length)];
      g.prevStatus=g.status;
      let ns=g.status; while(ns===g.status) ns=COLORS[Math.floor(rng()*3)];
      g.status=ns; g.sil=ns==="red"?clamp(g.sil+6,16,24):ns==="green"?clamp(g.sil-6,4,10):g.sil;
    }
  });
}

/* 침묵비율 막대(신호등 색) + 발언자수(청록 라인) 콤보 차트
   ─ 막대 색 = 신호등 상태(침묵 높음→침체red / 낮음→활발green). 선/표식 두께는 화면 내 고정. */
function statusColor(sil){ const s=statusFromSilence(sil); return s==="red"?"#ef4444":s==="yellow"?"#f0b429":"#22c55e"; }
/* 발언 적극성(Participation Activity) = 100 - 침묵비율. 높을수록 활발 → 막대도 높아짐 */
function actScore(sil){ return Math.round(100-sil); }
function actFrac(sil){ return clamp((100-sil-50)/50,0.08,1); } // 막대 높이 비율(적극성 50~100 → 0~1)
function chartParts(gs,baseY,top,ch,cw,bw,fs,pr,idfs,showId,offset){
  let bars="",circles="",labels="",nums="";const poly=[];
  gs.forEach((g,i)=>{
    const cx=(offset+i)*cw+cw/2;
    const bh=Math.max(5,Math.min(ch,actFrac(g.sil)*ch));
    bars+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${(baseY-bh).toFixed(1)}" width="${bw}" height="${bh.toFixed(1)}" rx="3" fill="${statusColor(g.sil)}" fill-opacity="0.85"/>`;
    const py=top+ch-(clamp(g.sp,0,12)/12)*ch;
    poly.push(`${cx.toFixed(1)},${py.toFixed(1)}`);
    circles+=`<circle cx="${cx.toFixed(1)}" cy="${py.toFixed(1)}" r="${pr}" fill="#5eead4"/>`;
    labels+=`<text x="${cx.toFixed(1)}" y="${(py-pr-5).toFixed(1)}" text-anchor="middle" font-size="${fs}" font-weight="800" fill="#bdf4e7">${g.sp}</text>`;
    if(showId) nums+=`<text x="${cx.toFixed(1)}" y="${(baseY+idfs+6).toFixed(1)}" text-anchor="middle" font-size="${idfs}" font-weight="700" fill="#7d8db0">${g.id}조</text>`;
  });
  return {bars,circles,labels,nums,poly};
}
function comboSVG(gs,o){
  const col=o.col,ch=o.ch,bw=o.bw,top=o.top??18,fs=o.fs??14,showId=o.showId!==false;
  const stroke=o.stroke??2.5,pr=o.pr??3.5,idfs=o.idfs??13;
  const numRow=showId?idfs+12:4;
  const W=gs.length*col, baseY=top+ch, H=baseY+numRow;
  const p=chartParts(gs,baseY,top,ch,col,bw,fs,pr,idfs,showId,0);
  return `<svg class="cchart" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`
    +`<line x1="0" y1="${baseY}" x2="${W}" y2="${baseY}" stroke="#22324f" stroke-width="1"/>`
    +p.bars+`<polyline points="${p.poly.join(" ")}" fill="none" stroke="#5eead4" stroke-width="${stroke}" stroke-linejoin="round" stroke-linecap="round"/>`
    +p.circles+p.labels+p.nums+`</svg>`;
}
/* 여러 자회사를 하나의 연속 차트로 — 막대/라인은 끊김 없이, 자회사 영역은 밴드+구분선+라벨로 구분 */
function comboSVGGrouped(sections,o){
  const ch=o.ch,bw=o.bw,top=o.top??46,fs=o.fs??15;
  const stroke=o.stroke??3,pr=o.pr??5,idfs=o.idfs??13,nmfs=o.nmfs??17;
  const flat=[];sections.forEach(s=>s.groups.forEach(g=>flat.push(g)));
  const n=flat.length, W=o.W??(n*(o.col||120)), cw=W/n;
  const baseY=top+ch, numRow=idfs+10, H=baseY+numRow;
  let bands="",names="",gi=0;
  sections.forEach((s,si)=>{
    const x0=gi*cw, w=s.groups.length*cw;
    bands+=`<rect x="${(x0+2).toFixed(1)}" y="${(top-10).toFixed(1)}" width="${(w-4).toFixed(1)}" height="${(ch+20).toFixed(1)}" rx="9" fill="${si%2?"rgba(255,255,255,.05)":"rgba(255,255,255,.018)"}"/>`;
    if(si>0) bands+=`<line x1="${x0.toFixed(1)}" y1="${(top-10).toFixed(1)}" x2="${x0.toFixed(1)}" y2="${(baseY+numRow).toFixed(1)}" stroke="#2a3a5a" stroke-width="1"/>`;
    const nm=s.co.length>8?s.co.slice(0,7)+"…":s.co;
    names+=`<text x="${(x0+w/2).toFixed(1)}" y="22" text-anchor="middle" font-size="${nmfs}" font-weight="800" fill="#cdd9ee">${nm}<tspan font-size="${nmfs-4}" font-weight="600" fill="#7d8db0"> ${s.groups.length}조</tspan></text>`;
    gi+=s.groups.length;
  });
  const p=chartParts(flat,baseY,top,ch,cw,bw,fs,pr,idfs,true,0);
  return `<svg class="cchart" width="${W}" height="${H}" viewBox="0 0 ${W} ${H}">`
    +bands+`<line x1="0" y1="${baseY}" x2="${W}" y2="${baseY}" stroke="#2a3a5a" stroke-width="1"/>`
    +p.bars+`<polyline points="${p.poly.join(" ")}" fill="none" stroke="#5eead4" stroke-width="${stroke}" stroke-linejoin="round" stroke-linecap="round"/>`
    +p.circles+p.labels+p.nums+names+`</svg>`;
}
function ovActs(gs){ return [...new Set([].concat(...gs.map(g=>g.acts.map(a=>a.txt))))]; }
function sumLegend(){return `<div class="ovlegend">
  <span><i class="ln"></i>발언자수(명)</span>
  <span class="lglb">토론 활성도 막대(신호등):</span>
  <span><i class="bsw g"></i>활발(90%↑)</span><span><i class="bsw y"></i>보통(80%↑)</span><span><i class="bsw r"></i>정체(80%미만)</span></div>`;}

const TAGC=["#60a5fa","#f0b429","#34d399","#f472b6","#a78bfa","#22d3ee","#fb923c","#f87171","#a3e635"];
function tagName(co){return co.replace(/·신한/g,"·").replace(/^신한/,"");}
/* 통합 액션 아이템 섹션 — 자회사 태그 + 내용, 자회사별 정렬, 초과 시 +N */
function ovActsG(gs){ const seen=new Set(),out=[];
  gs.forEach(g=>g.acts.forEach(a=>{ if(!seen.has(a.txt)){seen.add(a.txt);out.push({gid:g.id,txt:a.txt});} }));

function actionSection(companies){

    if(acts.length>cap) h+=`<span class="aitem more" style="--c:${c}"><span class="atag">${tag}</span><span class="aitxt">+${acts.length-cap}</span></span>`;

  return `<div class="actsec"><div class="ash">액션 아이템 <span>· 자회사별</span></div><div class="actflow">${chips}</div></div>`;

/* ===== 조별 Insight Dashboard (한 페이지 2개 조, 운영 관제형) ===== */
const STTXT={green:"활발",yellow:"보통",red:"정체"};
const STEMO={green:"🟢",yellow:"🟡",red:"🔴"};
/* 20분 단위 흐름 요약 — "무엇을 논의했는지" 문장형 (큐레이션 흐름 우선) */
function discLine(s,g){
  const idx=Math.min(s.batch-1,3);
  if(g&&g._flow) return g._flow[idx];
  const k=s.kws.map(x=>x.k);
  const T=[
    `${k[0]} 현황·목표 공유, ${k[1]||k[0]} 중요성 언급`,
    `${k[0]} 관점의 쟁점 논의${k[1]?` 및 ${k[1]} 검토`:""}`,
    `${k[0]} 대응 전략·아이디어 제시`,
    `${k[0]} 실행 방안 구체화 논의`,
  ];
  return T[idx];
}
/* AI Insight — 상태/방향성/리스크 요약 */
function aiInsight(g){
  if(g._insight) return g._insight;
  const tl=g.tl, first=tl[0].sil, last=tl[tl.length-1].sil;
  const rising=last>first+2, falling=last<first-2, theme=g.kwpool[0];
  if(g.status==="red"||(rising&&last>=15))
    return `발언이 줄며 논의가 정체되는 양상 — ${theme} 관련 새로운 전략 대안 탐색이 필요합니다.`;
  if(g.status==="green"&&g.acts.length>=2)
    return `${theme} 중심으로 논의가 활발하며, 실행 방안 구체화 단계로 진입 중입니다.`;
  if(falling)
    return `초반 대비 발언이 늘며 논의가 활성화되는 흐름 — 구체화 단계로 진전 중입니다.`;
  if(g.acts.length===0)
    return `${theme} 쟁점 공유 단계로, 아직 구체적 실행 방안은 도출 전입니다.`;
  return `${theme} 쟁점 중심으로 논의가 진행되며, 실행 방안 구체화 단계로 진입 중입니다.`;
}
/* 소형 추세 스파크라인(막대=신호등색, 라인=발언자수) */
function miniSpark(tl){
  const n=tl.length, W=250, ch=66, top=12, col=W/n, bw=Math.min(36,col*0.5), baseY=top+ch, H=baseY+4;
  let bars="";const poly=[];
  tl.forEach((s,i)=>{const cx=i*col+col/2, bh=Math.max(4,actFrac(s.sil)*ch);
    bars+=`<rect x="${(cx-bw/2).toFixed(1)}" y="${(baseY-bh).toFixed(1)}" width="${bw.toFixed(1)}" height="${bh.toFixed(1)}" rx="3" fill="${statusColor(s.sil)}" fill-opacity="0.85"/>`;
    const py=top+ch-(clamp(s.sp,0,12)/12)*ch; poly.push(`${cx.toFixed(1)},${py.toFixed(1)}`);});
  const circles=poly.map(p=>`<circle cx="${p.split(",")[0]}" cy="${p.split(",")[1]}" r="3" fill="#5eead4"/>`).join("");
  return `<svg width="${W}" height="${H}" viewBox="0 0 ${W} ${H}"><line x1="0" y1="${baseY}" x2="${W}" y2="${baseY}" stroke="#22324f" stroke-width="1"/>`
    +bars+`<polyline points="${poly.join(" ")}" fill="none" stroke="#5eead4" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>${circles}</svg>`;
}
function renderCard(g){
  const tl=g.tl.slice(-4);
  const rate=Math.min(100,Math.round(g.sp/g.part*100));
  const steps=tl.map((s,i)=>{
    const active=i===tl.length-1;

  return `<div class="icard">

      <div class="stile"><div class="slab">토론 활성도</div><div class="sval ${g.status}">${actScore(g.sil)}%</div><div class="ssub">AI 기반 토론 품질 평가</div></div>

  runEnterAnims(!!opts.sim);
}

/* 진입/갱신 애니메이션 */
function runEnterAnims(isSim){
  screen.querySelectorAll(".num,[data-act]").forEach(el=>{
    const from=+el.dataset.from,to=+el.dataset.to;
    if(from===to){el.textContent=to;return;}
    animateNumber(el,from,to,el.dataset.act?400:600);
  });
  screen.querySelectorAll(".row").forEach(row=>{
    const changed=row.querySelector("[data-changed]").dataset.changed==="1";
    const silEl=row.querySelector(".silence"), silUp=silEl.dataset.silup==="1";
    if(changed) row.classList.add("flash-bg");
    if(silUp) silEl.classList.add("flash-red");
    if(isSim){
      const act=row.querySelector(".actioncnt b");
      if(+act.dataset.to>+act.dataset.from) row.querySelector(".actioncnt").classList.add("flash-green");
    }
    setTimeout(()=>row.classList.remove("flash-bg"),600);
    setTimeout(()=>{silEl.classList.remove("flash-red");row.querySelector(".actioncnt").classList.remove("flash-green");},700);
  });
}
function animateNumber(el,from,to,dur){
  const t0=performance.now();
  (function step(t){
    const p=Math.min(1,(t-t0)/dur), e=1-Math.pow(1-p,3);
    el.textContent=Math.round(from+(to-from)*e);
    if(p<1) requestAnimationFrame(step); else el.textContent=to;
  })(performance.now());
}
function renderDots(){
  document.getElementById("dots").innerHTML=SCREENS.map((s,i)=>{
    const t=s.type==="summary"?(s.view==="bank"?"은행 요약":s.view==="mid"?"카드·증권·라이프":"기타 자회사 요약")
      :`${s.page+1}페이지 (${s.page*PER_PAGE+1}~${Math.min((s.page+1)*PER_PAGE,GROUPS.length)}조)`;
    return `<div class="pd ${i===idx?"on":""}" title="${t}" onclick="goto(${i})"></div>`;
  }).join("");
}
function updateCdRing(){
  const ring=document.getElementById("cdring"),txt=document.getElementById("cdtext");
  if(!ring) return;
  const C=2*Math.PI*22;
  ring.setAttribute("stroke-dasharray",C.toFixed(1));
  ring.setAttribute("stroke-dashoffset",(C*(1-countdown/interval)).toFixed(1));
  txt.textContent=countdown;
  ring.setAttribute("stroke",countdown<=Math.max(3,Math.round(interval*0.2))?"#f87171":"#60a5fa");
}

/* ============================ 갱신 시뮬레이션 ============================ */
function doSimulate(){ simulateBatch(); renderScreen({}); }

/* ============================ 롤링 / 컨트롤 ============================ */
function goto(i){ idx=(i+SCREENS.length)%SCREENS.length; countdown=interval; renderScreen({screenIn:true}); }
function gotoCompany(co){ const i=SCREENS.findIndex(s=>s.type==="sub"&&s.company===co); if(i>=0) goto(i); }
function nextScreen(){ goto(idx+1); }
function prevScreen(){ goto(idx-1); }
function tickCountdown(){ if(!playing) return; countdown--; if(countdown<=0){nextScreen();return;} updateCdRing(); }
function setPlaying(p){ playing=p; document.getElementById("playpause").textContent=p?"⏸ 일시정지":"▶ 재생"; }

document.getElementById("next").onclick=nextScreen;
document.getElementById("prev").onclick=prevScreen;
document.getElementById("sim").onclick=doSimulate;
document.getElementById("playpause").onclick=()=>setPlaying(!playing);
document.getElementById("ivrange").addEventListener("input",e=>{
  interval=+e.target.value;
  document.getElementById("ivval").textContent=interval;
  if(countdown>interval) countdown=interval;
  updateCdRing();
});
window.goto=goto; window.gotoCompany=gotoCompany;
document.addEventListener("keydown",e=>{
  if(e.key==="ArrowRight")nextScreen(); else if(e.key==="ArrowLeft")prevScreen();
  else if(e.key===" "){e.preventDefault();setPlaying(!playing);} else if(e.key.toLowerCase()==="s")doSimulate();
});

/* ============================ 화면 크기 자동 맞춤 ============================ */
function fitStage(){
  const s=Math.min(window.innerWidth/1920,window.innerHeight/1080);
  document.querySelector(".stage").style.transform=`scale(${s})`;
}
window.addEventListener("resize",fitStage);

/* ===== 캡처용 데모: 1/17 페이지(1·2조) 토론 여정에 뚜렷한 변화 부여 ===== */
const DEMO_FLOW={
  1:["퇴직연금 순증 부진 원인 진단 — 시장 지위 하락 위기감 공유",
     "디폴트옵션 수익률·라인업 경쟁력 격차가 핵심 쟁점으로 부각",
     "미래에셋 Catch-Up 위한 채널별 순증 KPI 재설계 논의",
     "디폴트옵션 3종 추가·영업점 배분 기준 실행안 합의 → 활성화"],
  2:["글로벌 Top-Line 정체와 해외법인 수익 기여도 점검",
     "베트남 리테일 여신 확대 vs 건전성 관리 의견 충돌(정체)",
     "현지화 전략·IB 연계 수익 다변화로 돌파구 모색",
     "베트남 법인 여신 한도 확대 로드맵 합의 → 논의 재점화"]
};
function applyDemoFlow(){
  const set=(id,sils,sps,flow,insight)=>{
    const g=GROUPS[id-1]; if(!g) return;
    g.part=8; g._flow=flow; g._insight=insight;
    g.tl.forEach((s,i)=>{ s.sil=sils[i]; s.sp=sps[i]; });
    const L=g.tl.length, last=g.tl[L-1], prev=g.tl[L-2];
    g.sil=last.sil; g.sp=last.sp; g.prevSil=prev.sil; g.prevSp=prev.sp;
    g.status=statusFromSilence(g.sil); g.prevStatus=statusFromSilence(prev.sil);
  };
  // 1조: 정체→활발 (꾸준한 개선) — 안착/실행 진입 톤
  set(1,[23,18,12,7],[4,5,6,8],DEMO_FLOW[1],
    "초반 위기감 공유에서 출발해 실행안 합의까지 도달 — 논의가 구체적 실행 단계로 안착했습니다.");
  // 2조: 보통→정체→활발 (정체 후 반등) — 주의/실행 연결 필요 톤
  set(2,[13,20,15,8],[6,4,5,7],DEMO_FLOW[2],
    "의견 충돌로 정체됐다 반등한 흐름 — 합의 모멘텀이 약화되지 않도록 실행 연결이 중요합니다.");
}

/* ============================ 부팅 ============================ */
buildInitial();
applyDemoFlow();
renderScreen({});
fitStage();
cdTimer=setInterval(tickCountdown,1000);
</script>
